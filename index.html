<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            color: white;
            font-family: sans-serif;
        }
        .checkerboard {
            background: repeating-conic-gradient(#2c2c2c 0% 25%, black 0% 50%) 50% / 20px 20px;
            animation: scroll 0.4s infinite linear;
        }
        @keyframes scroll {
            from {
                background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            }
            to {
                background-position: -10px -10px, -10px 0, 0 -20px, -20px -10px;
            }
        }
    </style>
</head>
<body class="checkerboard">

        import { main } from './src/main.ts';
        main().catch(err => console.error(err));
    </script>
